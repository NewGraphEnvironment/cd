name: Monthly Climate Data Update

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month, 6am UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max

    env:
      CDS_API_KEY: ${{ secrets.CDS_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::ecmwfr

      - name: Configure CDS API
        run: |
          echo "url: https://cds.climate.copernicus.eu/api" > ~/.cdsapirc
          echo "key: $CDS_API_KEY" >> ~/.cdsapirc
          chmod 600 ~/.cdsapirc

      - name: Set ecmwfr key
        run: |
          Rscript -e 'ecmwfr::wf_set_key(key = Sys.getenv("CDS_API_KEY"))'

      - name: Run update pipeline
        run: |
          mkdir -p logs
          Rscript scripts/pipeline_update.R 2>&1 | tee logs/update_$(date +%Y%m%d).log

      - name: Commit log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add logs/ || true
          git diff --cached --quiet || git commit -m "Monthly climate update $(date +%Y-%m-%d)"
          git push
